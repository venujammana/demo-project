# cloudbuild.yaml
steps:
- name: 'gcr.io/cloud-builders/docker'
  id: 'Build'
  args: [
    'build',
    '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/notes-app-repo/notes-app:${COMMIT_SHA}',
    './app'
  ]
  dir: 'demo-project'
- name: 'gcr.io/cloud-builders/docker'
  id: 'Push'
  args: [
    'push',
    'us-central1-docker.pkg.dev/${PROJECT_ID}/notes-app-repo/notes-app:${COMMIT_SHA}'
  ]
  dir: 'demo-project'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'Deploy to Cloud Run'
  entrypoint: gcloud
  args: [
    'run',
    'deploy', 'notes-app-service', # Cloud Run service name
    '--image', 'us-central1-docker.pkg.dev/${PROJECT_ID}/notes-app-repo/notes-app:${COMMIT_SHA}',
    '--region', 'us-central1', # Specify your desired region
    '--platform', 'managed',
    '--allow-unauthenticated', # Adjust based on your security needs, API Gateway will handle auth
    #'--update-secrets', 'GEMINI_API_KEY=gemini-api-key:latest', # Mount secret
    '--clear-env-vars', # Clear all existing environment variables
    '--set-env-vars', 'GOOGLE_CLOUD_PROJECT=${PROJECT_ID}', # Set project ID as env var
    '--quiet'
  ]
  dir: 'demo-project'

images:
- 'us-central1-docker.pkg.dev/${PROJECT_ID}/notes-app-repo/notes-app:${COMMIT_SHA}'
